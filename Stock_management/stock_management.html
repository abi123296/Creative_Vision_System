<div id="stock-management-module" class="module-container animate-fade-in">
    
    <!-- HEADER SECTION -->
    <div class="module-header glass-card">
        <div class="header-content">
            <h1>Stock Inventory</h1>
            <p>Creative Vision Management System</p>
        </div>
        <div class="header-stats">
            <div class="mini-stat">
                <span class="stat-label">Total items</span>
                <span id="total-items-badge" class="stat-value">0</span>
            </div>
            <div class="mini-stat text-red">
                <span class="stat-label">Low Stock</span>
                <span id="low-stock-badge" class="stat-value">0</span>
            </div>
        </div>
    </div>

    <!-- CONTROLS: SEARCH & ADDBTN -->
    <div class="stock-controls glass-card">
        <div class="search-row">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="stock-search" placeholder="Search product or SCAN BARCODE..." onkeyup="filterStocksBySearch()">
            </div>
            <button class="add-product-btn" id="toggle-add-stock-section">
                <i class="fa-solid fa-plus"></i> Add Product
            </button>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <button class="filter-pill active" data-category="all" onclick="filterByCategory('all')">All Items</button>
                <button class="filter-pill" onclick="filterByCategory('Books')" data-category="Books">Books</button>
                <button class="filter-pill" onclick="filterByCategory('Stationaries')" data-category="Stationaries">Stationaries</button>
                <button class="filter-pill" onclick="filterByCategory('Hand Crafts')" data-category="Hand Crafts">Hand Crafts</button>
            </div>
        </div>
    </div>

    <!-- INLINE ADD FORM -->
    <div id="stock-form-section" class="form-container glass-card">
        <div class="form-header">
            <h2><i class="fa-solid fa-cart-plus"></i> Add New Product</h2>
            <button class="close-btn" id="close-form-section" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <form id="stock-form">
            <input type="hidden" name="action" value="save_stock">
            <input type="hidden" name="id" value="">

            <div class="form-grid">
                <div class="form-group p-name-group">
                    <label>Product Name</label>
                    <input type="text" name="product_name" placeholder="Name" required>
                </div>
                <div class="form-group full-width">
                   <label>Select Category</label>
                   <div class="category-pill-box">
                       <label class="cat-pill">
                           <input type="radio" name="category" value="Books" checked>
                           <span>Books</span>
                       </label>
                       <label class="cat-pill">
                           <input type="radio" name="category" value="Stationaries">
                           <span>Stationaries</span>
                       </label>
                       <label class="cat-pill">
                           <input type="radio" name="category" value="Hand Crafts">
                           <span>Hand Crafts</span>
                       </label>
                       <label class="cat-pill">
                           <input type="radio" name="category" value="Other">
                           <span>Other</span>
                       </label>
                   </div>
                </div>

                <div class="form-group">
                    <label>Shortcut Name</label>
                    <input type="text" name="shortcut_name" placeholder="Shortcut">
                </div>
                <div class="form-group">
                    <label>Stock Amount</label>
                    <input type="number" name="stock_balance" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Alert Limit</label>
                    <input type="number" name="alert_limit" value="10" required>
                </div>
                <div class="form-group">
                    <label>Buy Price</label>
                    <input type="number" step="0.01" name="buy_price" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Sell Price</label>
                    <input type="number" step="0.01" name="sell_price" placeholder="0.00" required>
                </div>
                <div class="form-group full-width">
                    <label>QR Code Data</label>
                    <div class="qr-input-row" style="display:flex; gap:10px;">
                        <input type="text" name="qr_code" style="flex:1;" placeholder="Scan QR...">
                        <button type="button" class="btn-scan" style="width:40px;"><i class="fa-solid fa-qrcode"></i></button>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="button" class="btn-cancel" id="cancel-stock-form">Cancel</button>
                <button type="submit" class="btn-save">Save Product</button>
            </div>
        </form>
    </div>

    <!-- TABLE SECTION -->
    <div class="stock-table-area glass-card">
        <div class="table-header">
            <h3><i class="fa-solid fa-database"></i> Products Database</h3>
            <span class="item-count">Loading...</span>
        </div>
        
        <div class="table-responsive">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Shortcut</th>
                        <th>Buy Price</th>
                        <th>Sell Price</th>
                        <th>Stock Bal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="stock-table-body">
                     <tr><td colspan="7" style="text-align:center; padding: 50px;">Initial Load...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- EXPORT BUTTON AREA (AT THE BOTTOM OF DASHBOARD) -->
        <div class="export-area" style="margin-top:25px; display:flex; justify-content:center;">
             <button class="export-report-btn" id="open-export-menu">
                 <i class="fa-solid fa-file-export"></i> EXPORT STOCK REPORT
             </button>
        </div>
    </div>

    <!-- EXPORT MENU MODAL (SMALL OVERLAY) -->
    <div id="export-modal" class="modal-overlay" style="z-index: 10001;">
        <div class="modal-content glass-card" style="width: 400px; text-align: center;">
            <div class="modal-header">
                <h2>Generate Official Report</h2>
                <button class="close-modal" id="close-export-modal">&times;</button>
            </div>
            <p style="color: var(--text-low); margin-bottom: 20px;">Choose your preferred professional format:</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <button class="btn-save" onclick="window.generateStockReport('save')" style="background:linear-gradient(135deg, #3b82f6, #06b6d4);">
                    <i class="fa-solid fa-file-pdf"></i> SAVE PDF
                </button>
                <button class="btn-save" onclick="window.generateStockReport('print')" style="background:linear-gradient(135deg, #8b5cf6, #d946ef);">
                    <i class="fa-solid fa-print"></i> PRINT REPORT
                </button>
            </div>
        </div>
    </div>

    <!-- HIDDEN REPORT CONTAINER (FOR PDF GENERATION) -->
    <div id="hidden-report-template" style="display: none; width: 800px; padding: 40px; background: #fff; color: #000; font-family: 'Outfit', sans-serif;">
        <!-- CONTENT WILL BE INJECTED VIA JS -->
    </div>

    <!-- EDIT POPUP MODAL (UNCHANGED) -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2><i class="fa-solid fa-pen-to-square"></i> Edit Details</h2>
                <button class="close-modal" id="close-edit-modal" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="edit-stock-form" class="modal-form">
                <input type="hidden" name="action" value="save_stock">
                <input type="hidden" name="id" id="edit-stock-id">

                <div class="form-grid">
                    <div class="form-group p-name-group">
                        <label>Product Name</label>
                        <input type="text" name="product_name" id="edit-p-name" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Category</label>
                        <div class="category-pill-box">
                            <label class="cat-pill"><input type="radio" name="category" value="Books" id="edit-cat-books"> <span>Books</span></label>
                            <label class="cat-pill"><input type="radio" name="category" value="Stationaries" id="edit-cat-stationaries"> <span>Stationaries</span></label>
                            <label class="cat-pill"><input type="radio" name="category" value="Hand Crafts" id="edit-cat-crafts"> <span>Hand Crafts</span></label>
                            <label class="cat-pill"><input type="radio" name="category" value="Other" id="edit-cat-other"> <span>Other</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Shortcut</label>
                        <input type="text" name="shortcut_name" id="edit-p-short">
                    </div>
                    <div class="form-group">
                        <label>Stock Balance</label>
                        <input type="number" name="stock_balance" id="edit-p-bal" required>
                    </div>
                    <div class="form-group">
                        <label>Low Limit</label>
                        <input type="number" name="alert_limit" id="edit-p-alert" required>
                    </div>
                    <div class="form-group">
                        <label>Buy Price</label>
                        <input type="number" step="0.01" name="buy_price" id="edit-p-buy" required>
                    </div>
                    <div class="form-group">
                        <label>Sell Price</label>
                        <input type="number" step="0.01" name="sell_price" id="edit-p-sell" required>
                    </div>
                    <div class="form-group full-width">
                        <label>QR Code Data</label>
                        <div class="qr-input-row" style="display:flex; gap:10px;">
                            <input type="text" name="qr_code" id="edit-p-qr" style="flex:1;">
                            <button type="button" class="btn-scan" style="width:36px;"><i class="fa-solid fa-qrcode"></i></button>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancel-edit-modal">Cancel</button>
                    <button type="submit" class="btn-save">Update</button>
                </div>
            </form>
        </div>
    </div>

</div>

<!-- Libraries for PDF and Charting -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Styles and Scripts -->
<link rel="stylesheet" href="../Stock_management/stock_management.css">
<script src="../Stock_management/stock_management.js"></script>
