<!-- 
  ========================================================
  UI: POS System (Creative Vision Redesigned)
  PURPOSE: Fast billing, search, and stock integration.
  ======================================================== 
-->
<div class="pos-container animate-fade-in">
    <!-- TOP BAR: Search & Filters -->
    <div class="pos-header">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="pos-search" placeholder="Search by name or scan barcode..." oninput="filterProducts()">
        </div>
        <div class="category-tabs" id="pos-categories">
            <button class="cat-btn active" onclick="filterCategory('All')">All</button>
            <button class="cat-btn" onclick="filterCategory('Accessory')">Accessories</button>
            <button class="cat-btn" onclick="filterCategory('Reload')">Reloads</button>
            <button class="cat-btn" onclick="filterCategory('Card')">SIM/Top-up Cards</button>
        </div>
    </div>

    <div class="pos-main-layout">
        <!-- LEFT: Product Grid -->
        <div class="product-catalog glass-card">
            <div class="product-grid" id="product-grid">
                <!-- Loaded via JS -->
                <div class="loading-spinner">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Loading Products...
                </div>
            </div>
        </div>

        <!-- RIGHT: Cart & Checkout -->
        <div class="pos-billing-area glass-card">
            <div class="bill-header">
                <h3>Current Order</h3>
                <button class="clear-btn" onclick="clearCart()"><i class="fa-solid fa-trash-can"></i> Clear</button>
            </div>

            <div class="cart-items" id="cart-items">
                <!-- Cart items will appear here -->
                <div class="empty-cart-msg">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <p>Cart is empty</p>
                </div>
            </div>

            <div class="bill-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="bill-subtotal">Rs. 0.00</span>
                </div>
                <div class="summary-row">
                    <span>Discount</span>
                    <div class="discount-input-wrapper">
                        <span>Rs.</span>
                        <input type="number" id="bill-discount" value="0" oninput="calculateTotal()">
                    </div>
                </div>
                <div class="summary-total">
                    <span>Total Payable</span>
                    <span id="bill-total">Rs. 0.00</span>
                </div>
            </div>

            <div class="payment-methods">
                <p>Payment Method</p>
                <div class="method-grid">
                    <label class="method-card active">
                        <input type="radio" name="payment-method" value="Cash" checked>
                        <i class="fa-solid fa-money-bill-1-wave"></i>
                        <span>Cash</span>
                    </label>
                    <label class="method-card">
                        <input type="radio" name="payment-method" value="Card">
                        <i class="fa-solid fa-credit-card"></i>
                        <span>Card</span>
                    </label>
                    <label class="method-card">
                        <input type="radio" name="payment-method" value="Online">
                        <i class="fa-solid fa-globe"></i>
                        <span>Online</span>
                    </label>
                </div>
            </div>

            <button class="checkout-btn" id="checkout-btn" onclick="processCheckout()">
                <span>CONFIRM & PRINT</span>
                <i class="fa-solid fa-print"></i>
            </button>
        </div>
    </div>
</div>

<!-- RELOAD MODAL -->
<div id="reload-modal" class="modal-overlay">
    <div class="modal-content glass-card">
        <div class="modal-header">
            <h3>Custom Reload</h3>
            <button class="close-modal" onclick="closeReloadModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Network</label>
                <select id="reload-network" class="pos-input">
                    <option value="Dialog">Dialog</option>
                    <option value="Mobitel">Mobitel</option>
                    <option value="Airtel">Airtel</option>
                    <option value="Hutch">Hutch</option>
                    <option value="EzCash">EzCash</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (Rs.)</label>
                <input type="number" id="reload-amount" class="pos-input" placeholder="Enter amount">
            </div>
            <button class="confirm-btn" onclick="addReloadToCart()">Add to Bill</button>
        </div>
    </div>
</div>

<link rel="stylesheet" href="../POS_system/pos.css">
<script src="../POS_system/pos.js"></script>
